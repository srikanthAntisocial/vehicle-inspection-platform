version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: vi_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vehicle_inspection
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vehicle_inspection"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vi_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      # Override DB host so it points to the compose service.
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/vehicle_inspection
      SYNC_DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/vehicle_inspection
      API_BASE_URL: http://localhost:8000
    volumes:
      - backend_uploads:/app/uploads
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vi_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_BRAND_NAME: ${BRAND_NAME:-AutoVision Inspect}
      NEXT_PUBLIC_BRAND_TAGLINE: ${BRAND_TAGLINE:-AI-powered vehicle damage intelligence}
    ports:
      - "3000:3000"

  nginx:
    image: nginx:1.25-alpine
    container_name: vi_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  db_data:
  backend_uploads:
